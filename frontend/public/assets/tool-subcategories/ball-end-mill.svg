      <path d="M 138,498 C 175,508 185,520 220,528"/>
      <path d="M 142,520 C 168,540 192,558 180,580"/>
    </g>
    <g stroke-width="0.7" stroke-dasharray="3 4" opacity="0.45">
      <path d="M 222,358 C 185,368 175,380 138,388"/>
      <path d="M 222,388 C 185,398 175,410 138,418"/>
      <path d="M 222,418 C 185,428 175,440 138,448"/>
      <path d="M 222,448 C 185,458 175,470 138,478"/>
      <path d="M 222,478 C 185,488 175,500 138,508"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="600" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
