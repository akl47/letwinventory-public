<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <!-- Long shank — almost the full tool length -->
    <line x1="125" y1="80" x2="125" y2="395"/>
    <line x1="235" y1="80" x2="235" y2="395"/>
    <!-- Sharp V tip emerging directly from the shank — typical engraving V-bit -->
    <line x1="125" y1="395" x2="180" y2="490"/>
    <line x1="235" y1="395" x2="180" y2="490"/>
    <!-- Single visible cutting flute on the V (face of the bit) -->
    <line x1="180" y1="395" x2="180" y2="490" stroke-width="1.4"/>
    <line x1="180" y1="68" x2="180" y2="498" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="490" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="490" x2="178" y2="490" stroke-dasharray="3 3"/>
    <text x="52" y="280" text-anchor="middle" stroke="none" transform="rotate(-90 52,280)" font-weight="600">Overall Length</text>
    <line x1="125" y1="525" x2="235" y2="525" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="397" x2="125" y2="528" stroke-dasharray="3 3"/>
    <line x1="235" y1="397" x2="235" y2="528" stroke-dasharray="3 3"/>
    <text x="180" y="545" text-anchor="middle" stroke="none">Diameter (largest)</text>
    <line x1="248" y1="475" x2="200" y2="467" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="254" y="479" stroke="none">Tip Angle</text>
  </g>
</svg>
