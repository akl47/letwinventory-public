<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="332"/>
    <line x1="235" y1="80" x2="235" y2="332"/>
    <line x1="125" y1="332" x2="138" y2="350"/>
    <line x1="235" y1="332" x2="222" y2="350"/>
    <!-- Tapered body: sides slope inward toward the tip -->
    <line x1="138" y1="350" x2="155" y2="580"/>
    <line x1="222" y1="350" x2="205" y2="580"/>
    <line x1="155" y1="580" x2="205" y2="580" stroke-width="2"/>
    <!-- Tapered helical flutes — narrow toward the tip -->
    <g stroke-width="1.2">
      <path d="M 138,350 C 175,360 185,370 220,378"/>
      <path d="M 140,378 C 174,388 184,400 218,408"/>
      <path d="M 142,408 C 173,418 183,430 215,438"/>
      <path d="M 144,438 C 172,448 182,460 213,468"/>
      <path d="M 146,468 C 171,478 181,490 211,498"/>
      <path d="M 148,498 C 170,508 180,520 209,528"/>
      <path d="M 150,528 C 169,538 179,550 207,558"/>
      <path d="M 152,558 C 168,566 178,575 205,580"/>
    </g>
    <g stroke-width="0.7" stroke-dasharray="3 4" opacity="0.45">
      <path d="M 220,358 C 185,368 175,380 140,388"/>
      <path d="M 218,388 C 184,398 174,410 142,418"/>
      <path d="M 215,418 C 183,428 173,440 144,448"/>
      <path d="M 213,448 C 182,458 172,470 146,478"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="600" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="580" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="580" x2="155" y2="580" stroke-dasharray="3 3"/>
    <text x="52" y="324" text-anchor="middle" stroke="none" transform="rotate(-90 52,324)" font-weight="600">Overall Length</text>
    <line x1="270" y1="350" x2="270" y2="580" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="224" y1="350" x2="273" y2="350" stroke-dasharray="3 3"/>
    <line x1="207" y1="580" x2="273" y2="580" stroke-dasharray="3 3"/>
    <text x="286" y="464" text-anchor="middle" stroke="none" transform="rotate(-90 286,464)">Flute Length</text>
    <!-- Diameter dimension at the tip (smaller end) -->
    <line x1="155" y1="625" x2="205" y2="625" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="155" y1="582" x2="155" y2="628" stroke-dasharray="3 3"/>
    <line x1="205" y1="582" x2="205" y2="628" stroke-dasharray="3 3"/>
    <text x="180" y="645" text-anchor="middle" stroke="none">Diameter (tip)</text>
    <!-- Tip-angle / taper-angle callout -->
    <line x1="245" y1="600" x2="195" y2="595" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="252" y="603" stroke="none">Tip Angle</text>
  </g>
</svg>
