<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 480 460" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top chamfer on the narrow shank -->
    <line x1="218" y1="68" x2="262" y2="68"/>
    <line x1="210" y1="80" x2="218" y2="68"/>
    <line x1="262" y1="68" x2="270" y2="80"/>
    <!-- Reduced-diameter shank (mounts in the spindle / collet) -->
    <line x1="210" y1="80" x2="210" y2="190"/>
    <line x1="270" y1="80" x2="270" y2="190"/>
    <!-- Sloped step out to the wider holder body -->
    <line x1="210" y1="190" x2="170" y2="210"/>
    <line x1="270" y1="190" x2="310" y2="210"/>
    <!-- Wider, short cylindrical holder body -->
    <line x1="170" y1="210" x2="170" y2="320"/>
    <line x1="310" y1="210" x2="310" y2="320"/>
    <line x1="170" y1="320" x2="310" y2="320"/>
    <!-- Slanted slot through the wider body near the bottom (~25° from horizontal). -->
    <line x1="170" y1="240" x2="310" y2="305"/>
    <line x1="170" y1="260" x2="310" y2="325"/>
    <!-- Tool bit protruding past the right side of the body, aligned with the slot. -->
    <line x1="310" y1="305" x2="364" y2="330"/>
    <line x1="310" y1="325" x2="364" y2="350"/>
    <line x1="364" y1="330" x2="364" y2="350" stroke-width="1.4"/>
    <!-- Cutting tip at the lower-outer corner with a small relief cut -->
    <line x1="364" y1="350" x2="356" y2="342" stroke-width="1.4"/>
    <!-- Centerline (the holder's rotation axis) -->
    <line x1="240" y1="68" x2="240" y2="365" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <!-- Shank Diameter (the narrow upper shank that mounts in the spindle) -->
    <line x1="210" y1="40" x2="270" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="210" y1="42" x2="210" y2="68" stroke-dasharray="3 3"/>
    <line x1="270" y1="42" x2="270" y2="68" stroke-dasharray="3 3"/>
    <text x="240" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <!-- Overall Length: top to cutting tip -->
    <line x1="80" y1="68" x2="80" y2="350" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="208" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="350" x2="362" y2="350" stroke-dasharray="3 3"/>
    <text x="66" y="210" text-anchor="middle" stroke="none" transform="rotate(-90 66,210)" font-weight="600">Overall Length</text>
    <!-- Diameter (cutting circle swept by the bit's cutting tip) -->
    <line x1="116" y1="405" x2="364" y2="405" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="116" y1="350" x2="116" y2="408" stroke-dasharray="3 3"/>
    <line x1="364" y1="352" x2="364" y2="408" stroke-dasharray="3 3"/>
    <text x="240" y="425" text-anchor="middle" stroke="none">Diameter (cutting swing)</text>
  </g>
</svg>
