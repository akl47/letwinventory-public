<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <!-- Long uniform-diameter cylindrical bar with an L-shaped notch near the tip for the insert pocket. -->
    <path d="M 125,80
             L 125,575
             L 235,575
             L 235,565
             L 215,560
             L 215,510
             L 235,500
             L 235,80"/>
    <!-- Triangular carbide insert seated in the pocket, cutting corner extending past the bar -->
    <path d="M 215,510 L 262,540 L 215,558 Z" stroke-width="1.4"/>
    <!-- Clamp screw on the insert -->
    <circle cx="232" cy="535" r="3.5"/>
    <line x1="230" y1="533" x2="234" y2="537"/>
    <!-- Centerline -->
    <line x1="180" y1="68" x2="180" y2="585" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="575" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="575" x2="123" y2="575" stroke-dasharray="3 3"/>
    <text x="52" y="320" text-anchor="middle" stroke="none" transform="rotate(-90 52,320)" font-weight="600">Overall Length</text>
    <line x1="98" y1="630" x2="262" y2="630" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="98" y1="540" x2="98" y2="633" stroke-dasharray="3 3"/>
    <line x1="262" y1="540" x2="262" y2="633" stroke-dasharray="3 3"/>
    <text x="180" y="650" text-anchor="middle" stroke="none">Diameter (cutting circle)</text>
    <line x1="290" y1="540" x2="258" y2="540" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="296" y="544" stroke="none">Insert</text>
  </g>
</svg>
