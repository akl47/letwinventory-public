<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="332"/>
    <line x1="235" y1="80" x2="235" y2="332"/>
    <line x1="125" y1="332" x2="138" y2="350"/>
    <line x1="235" y1="332" x2="222" y2="350"/>
    <!-- Cutting body OUTLINE drawn as sawtooth — each "step" is one thread tooth wrapping the body -->
    <path d="M 138,350 L 132,360 L 138,370 L 132,380 L 138,390 L 132,400 L 138,410 L 132,420 L 138,430 L 132,440 L 138,450 L 132,460 L 138,470 L 132,480 L 138,490 L 132,500 L 138,510 L 132,520 L 138,530 L 132,540 L 138,550 L 132,560 L 138,570 L 132,580"/>
    <path d="M 222,350 L 228,360 L 222,370 L 228,380 L 222,390 L 228,400 L 222,410 L 228,420 L 222,430 L 228,440 L 222,450 L 228,460 L 222,470 L 228,480 L 222,490 L 228,500 L 222,510 L 228,520 L 222,530 L 228,540 L 222,550 L 228,560 L 222,570 L 228,580"/>
    <!-- Flat tip -->
    <line x1="132" y1="580" x2="228" y2="580" stroke-width="2"/>
    <!-- Helical flutes (the rotational cutting flutes — like an end mill, ~30° helix) -->
    <g stroke-width="1.3">
      <path d="M 138,355 C 175,370 165,385 222,395"/>
      <path d="M 138,395 C 175,410 165,425 222,435"/>
      <path d="M 138,435 C 175,450 165,465 222,475"/>
      <path d="M 138,475 C 175,490 165,505 222,515"/>
      <path d="M 138,515 C 175,530 165,545 222,555"/>
      <path d="M 142,555 C 168,565 188,575 222,578"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="595" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="580" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="580" x2="130" y2="580" stroke-dasharray="3 3"/>
    <text x="52" y="324" text-anchor="middle" stroke="none" transform="rotate(-90 52,324)" font-weight="600">Overall Length</text>
    <line x1="270" y1="350" x2="270" y2="580" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="228" y1="350" x2="273" y2="350" stroke-dasharray="3 3"/>
    <line x1="228" y1="580" x2="273" y2="580" stroke-dasharray="3 3"/>
    <text x="286" y="464" text-anchor="middle" stroke="none" transform="rotate(-90 286,464)">Flute Length (thread)</text>
    <line x1="125" y1="625" x2="235" y2="625" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="582" x2="125" y2="628" stroke-dasharray="3 3"/>
    <line x1="235" y1="582" x2="235" y2="628" stroke-dasharray="3 3"/>
    <text x="180" y="645" text-anchor="middle" stroke="none">Diameter (major)</text>
  </g>
</svg>
