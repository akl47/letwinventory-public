<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 480 480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Tall arbor / shank (narrower) -->
    <line x1="200" y1="60" x2="280" y2="60"/>
    <line x1="200" y1="60" x2="200" y2="180"/>
    <line x1="280" y1="60" x2="280" y2="180"/>
    <!-- Shoulder out to the wide cutter body -->
    <line x1="200" y1="180" x2="120" y2="220"/>
    <line x1="280" y1="180" x2="360" y2="220"/>
    <!-- Wide short cutter body -->
    <line x1="120" y1="220" x2="120" y2="320"/>
    <line x1="360" y1="220" x2="360" y2="320"/>
    <line x1="120" y1="320" x2="360" y2="320" stroke-width="2"/>
    <!-- Insert pockets along the bottom edge (5-6 cutting inserts) -->
    <g stroke-width="1.2">
      <path d="M 130,320 L 134,310 L 152,310 L 156,320 Z"/>
      <path d="M 175,320 L 179,310 L 197,310 L 201,320 Z"/>
      <path d="M 220,320 L 224,310 L 242,310 L 246,320 Z"/>
      <path d="M 265,320 L 269,310 L 287,310 L 291,320 Z"/>
      <path d="M 310,320 L 314,310 L 332,310 L 336,320 Z"/>
    </g>
    <!-- Outer corner cutting flutes hint -->
    <line x1="120" y1="305" x2="115" y2="320" stroke-width="1.2"/>
    <line x1="360" y1="305" x2="365" y2="320" stroke-width="1.2"/>
    <line x1="240" y1="60" x2="240" y2="335" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="200" y1="32" x2="280" y2="32" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="200" y1="34" x2="200" y2="60" stroke-dasharray="3 3"/>
    <line x1="280" y1="34" x2="280" y2="60" stroke-dasharray="3 3"/>
    <text x="240" y="22" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="50" y1="60" x2="50" y2="320" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="42" y1="60" x2="198" y2="60" stroke-dasharray="3 3"/>
    <line x1="42" y1="320" x2="118" y2="320" stroke-dasharray="3 3"/>
    <text x="34" y="190" text-anchor="middle" stroke="none" transform="rotate(-90 34,190)" font-weight="600">Overall Length</text>
    <line x1="120" y1="370" x2="360" y2="370" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="120" y1="322" x2="120" y2="373" stroke-dasharray="3 3"/>
    <line x1="360" y1="322" x2="360" y2="373" stroke-dasharray="3 3"/>
    <text x="240" y="390" text-anchor="middle" stroke="none">Diameter</text>
    <line x1="385" y1="318" x2="345" y2="316" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="392" y="320" stroke="none">Insert pockets (Number of Flutes)</text>
  </g>
</svg>
