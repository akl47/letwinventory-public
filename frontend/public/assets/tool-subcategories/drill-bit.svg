<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="332"/>
    <line x1="235" y1="80" x2="235" y2="332"/>
    <line x1="125" y1="332" x2="138" y2="350"/>
    <line x1="235" y1="332" x2="222" y2="350"/>
    <line x1="138" y1="350" x2="138" y2="555"/>
    <line x1="222" y1="350" x2="222" y2="555"/>
    <!-- 118° point: cone height 25 -->
    <line x1="138" y1="555" x2="180" y2="580"/>
    <line x1="222" y1="555" x2="180" y2="580"/>
    <!-- Chisel edge across the tip (where the two cutting lips meet) -->
    <line x1="172" y1="571" x2="188" y2="571" stroke-width="1.4"/>
    <!-- 2-flute helical twist drill — smooth gentle helical curves -->
    <g stroke-width="1.3">
      <path d="M 138,355 C 175,385 185,415 222,445"/>
      <path d="M 138,395 C 175,425 185,455 222,485"/>
      <path d="M 138,435 C 175,465 185,495 222,525"/>
      <path d="M 138,475 C 175,505 188,535 215,552"/>
    </g>
    <g stroke-width="0.7" stroke-dasharray="3 4" opacity="0.45">
      <path d="M 222,375 C 185,405 175,435 138,465"/>
      <path d="M 222,415 C 185,445 175,475 138,505"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="590" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="580" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="580" x2="178" y2="580" stroke-dasharray="3 3"/>
    <text x="52" y="324" text-anchor="middle" stroke="none" transform="rotate(-90 52,324)" font-weight="600">Overall Length</text>
    <line x1="270" y1="350" x2="270" y2="555" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="224" y1="350" x2="273" y2="350" stroke-dasharray="3 3"/>
    <line x1="224" y1="555" x2="273" y2="555" stroke-dasharray="3 3"/>
    <text x="286" y="452" text-anchor="middle" stroke="none" transform="rotate(-90 286,452)">Flute Length</text>
    <line x1="138" y1="625" x2="222" y2="625" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="138" y1="557" x2="138" y2="628" stroke-dasharray="3 3"/>
    <line x1="222" y1="557" x2="222" y2="628" stroke-dasharray="3 3"/>
    <text x="180" y="645" text-anchor="middle" stroke="none">Diameter</text>
    <line x1="245" y1="585" x2="200" y2="580" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="252" y="589" stroke="none">Tip Angle</text>
  </g>
</svg>
