<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="400"/>
    <line x1="235" y1="80" x2="235" y2="400"/>
    <!-- 60° countersink shoulder reducing from full body Ø to small drill Ø -->
    <line x1="125" y1="400" x2="170" y2="478"/>
    <line x1="235" y1="400" x2="190" y2="478"/>
    <!-- Small cylindrical drill section -->
    <line x1="170" y1="478" x2="170" y2="525"/>
    <line x1="190" y1="478" x2="190" y2="525"/>
    <!-- Sharp drill point (~118°) -->
    <line x1="170" y1="525" x2="180" y2="531"/>
    <line x1="190" y1="525" x2="180" y2="531"/>
    <!-- Helical flutes on the small drill section -->
    <g stroke-width="1.1">
      <path d="M 170,480 C 178,490 184,505 188,524"/>
      <path d="M 173,495 C 178,505 184,515 190,524"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="540" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter (body)</text>
    <line x1="68" y1="68" x2="68" y2="531" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="531" x2="178" y2="531" stroke-dasharray="3 3"/>
    <text x="52" y="300" text-anchor="middle" stroke="none" transform="rotate(-90 52,300)" font-weight="600">Overall Length</text>
    <line x1="170" y1="558" x2="190" y2="558" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="170" y1="533" x2="170" y2="561" stroke-dasharray="3 3"/>
    <line x1="190" y1="533" x2="190" y2="561" stroke-dasharray="3 3"/>
    <text x="180" y="576" text-anchor="middle" stroke="none">Diameter (drill tip)</text>
    <line x1="248" y1="528" x2="195" y2="528" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="254" y="532" stroke="none">Tip Angle</text>
  </g>
</svg>
