<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top chamfer on the narrow shank -->
    <line x1="158" y1="68" x2="202" y2="68"/>
    <line x1="150" y1="80" x2="158" y2="68"/>
    <line x1="202" y1="68" x2="210" y2="80"/>
    <!-- Reduced-diameter shank -->
    <line x1="150" y1="80" x2="150" y2="332"/>
    <line x1="210" y1="80" x2="210" y2="332"/>
    <!-- Sloped step OUT to the wider cutter body -->
    <line x1="150" y1="332" x2="125" y2="350"/>
    <line x1="210" y1="332" x2="235" y2="350"/>
    <!-- Cutter body sides (wider than the shank) -->
    <line x1="125" y1="350" x2="125" y2="565"/>
    <line x1="235" y1="350" x2="235" y2="565"/>
    <!-- Lead chamfer at the tip -->
    <line x1="125" y1="565" x2="135" y2="585"/>
    <line x1="235" y1="565" x2="225" y2="585"/>
    <line x1="135" y1="585" x2="225" y2="585" stroke-width="2"/>
    <!-- Straight (axial) flutes — parallel lines down the body -->
    <g stroke-width="1.1">
      <line x1="138" y1="350" x2="138" y2="565"/>
      <line x1="152" y1="350" x2="152" y2="565"/>
      <line x1="166" y1="350" x2="166" y2="565"/>
      <line x1="194" y1="350" x2="194" y2="565"/>
      <line x1="208" y1="350" x2="208" y2="565"/>
      <line x1="222" y1="350" x2="222" y2="565"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="595" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <!-- Shank Diameter (the narrow upper shank) -->
    <line x1="150" y1="40" x2="210" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="150" y1="42" x2="150" y2="68" stroke-dasharray="3 3"/>
    <line x1="210" y1="42" x2="210" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="585" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="148" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="585" x2="135" y2="585" stroke-dasharray="3 3"/>
    <text x="52" y="326" text-anchor="middle" stroke="none" transform="rotate(-90 52,326)" font-weight="600">Overall Length</text>
    <line x1="280" y1="350" x2="280" y2="585" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="237" y1="350" x2="283" y2="350" stroke-dasharray="3 3"/>
    <line x1="225" y1="585" x2="283" y2="585" stroke-dasharray="3 3"/>
    <text x="296" y="467" text-anchor="middle" stroke="none" transform="rotate(-90 296,467)">Flute Length</text>
    <!-- Diameter (cutter body — the largest, wider than the shank) -->
    <line x1="125" y1="630" x2="235" y2="630" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="567" x2="125" y2="633" stroke-dasharray="3 3"/>
    <line x1="235" y1="567" x2="235" y2="633" stroke-dasharray="3 3"/>
    <text x="180" y="650" text-anchor="middle" stroke="none">Diameter</text>
  </g>
</svg>
