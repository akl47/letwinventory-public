<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="332"/>
    <line x1="235" y1="80" x2="235" y2="332"/>
    <line x1="125" y1="332" x2="160" y2="362"/>
    <line x1="235" y1="332" x2="200" y2="362"/>
    <!-- Short neck -->
    <line x1="160" y1="362" x2="160" y2="395"/>
    <line x1="200" y1="362" x2="200" y2="395"/>
    <!-- Compact disc cutter at the bottom -->
    <line x1="160" y1="395" x2="115" y2="395"/>
    <line x1="200" y1="395" x2="245" y2="395"/>
    <line x1="115" y1="395" x2="115" y2="445"/>
    <line x1="245" y1="395" x2="245" y2="445"/>
    <line x1="115" y1="445" x2="245" y2="445" stroke-width="2"/>
    <g stroke-width="1.1">
      <line x1="115" y1="408" x2="121" y2="412"/>
      <line x1="115" y1="425" x2="121" y2="429"/>
      <line x1="115" y1="442" x2="121" y2="445"/>
      <line x1="245" y1="408" x2="239" y2="412"/>
      <line x1="245" y1="425" x2="239" y2="429"/>
      <line x1="245" y1="442" x2="239" y2="445"/>
      <line x1="135" y1="445" x2="135" y2="438"/>
      <line x1="155" y1="445" x2="155" y2="438"/>
      <line x1="180" y1="445" x2="180" y2="438"/>
      <line x1="205" y1="445" x2="205" y2="438"/>
      <line x1="225" y1="445" x2="225" y2="438"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="460" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
