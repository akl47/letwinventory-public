  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="68" y1="68" x2="68" y2="445" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="60" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="60" y1="445" x2="113" y2="445" stroke-dasharray="3 3"/>
    <text x="52" y="256" text-anchor="middle" stroke="none" transform="rotate(-90 52,256)" font-weight="600">Overall Length</text>
    <line x1="280" y1="395" x2="280" y2="445" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="247" y1="395" x2="283" y2="395" stroke-dasharray="3 3"/>
    <line x1="247" y1="445" x2="283" y2="445" stroke-dasharray="3 3"/>
    <text x="296" y="425" text-anchor="middle" stroke="none" transform="rotate(-90 296,425)">Flute Length</text>
    <line x1="115" y1="490" x2="245" y2="490" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="115" y1="447" x2="115" y2="493" stroke-dasharray="3 3"/>
    <line x1="245" y1="447" x2="245" y2="493" stroke-dasharray="3 3"/>
    <text x="180" y="510" text-anchor="middle" stroke="none">Diameter (disc)</text>
