<svg xmlns="http://www.w3.org/2000/svg" color="white" viewBox="0 0 360 720" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <line x1="135" y1="68" x2="225" y2="68"/>
    <line x1="125" y1="80" x2="135" y2="68"/>
    <line x1="225" y1="68" x2="235" y2="80"/>
    <line x1="125" y1="80" x2="125" y2="332"/>
    <line x1="235" y1="80" x2="235" y2="332"/>
    <line x1="125" y1="332" x2="148" y2="360"/>
    <line x1="235" y1="332" x2="212" y2="360"/>
    <!-- Narrow neck above the dovetail head -->
    <line x1="148" y1="360" x2="148" y2="490"/>
    <line x1="212" y1="360" x2="212" y2="490"/>
    <!-- Dovetail flares outward (inverse taper) toward the tip -->
    <line x1="148" y1="490" x2="120" y2="560"/>
    <line x1="212" y1="490" x2="240" y2="560"/>
    <line x1="120" y1="560" x2="240" y2="560" stroke-width="2"/>
    <g stroke-width="1.2">
      <!-- Flutes on the dovetail flare (no flutes on the reduced-shank neck) -->
      <path d="M 145,498 C 138,515 130,535 123,557"/>
      <path d="M 165,495 C 158,515 152,535 147,557"/>
      <path d="M 195,495 C 202,515 208,535 213,557"/>
      <path d="M 215,498 C 222,515 230,535 237,557"/>
    </g>
    <line x1="180" y1="68" x2="180" y2="580" stroke-dasharray="1 6" stroke-width="0.6" opacity="0.45"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="0.9" font-size="12">
    <line x1="125" y1="40" x2="235" y2="40" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="125" y1="42" x2="125" y2="68" stroke-dasharray="3 3"/>
    <line x1="235" y1="42" x2="235" y2="68" stroke-dasharray="3 3"/>
    <text x="180" y="30" text-anchor="middle" stroke="none">Shank Diameter</text>
    <line x1="60" y1="68" x2="60" y2="560" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="50" y1="68" x2="123" y2="68" stroke-dasharray="3 3"/>
    <line x1="50" y1="560" x2="120" y2="560" stroke-dasharray="3 3"/>
    <text x="44" y="314" text-anchor="middle" stroke="none" transform="rotate(-90 44,314)" font-weight="600">Overall Length</text>
    <line x1="280" y1="490" x2="280" y2="560" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="214" y1="490" x2="283" y2="490" stroke-dasharray="3 3"/>
    <line x1="240" y1="560" x2="283" y2="560" stroke-dasharray="3 3"/>
    <text x="296" y="525" text-anchor="middle" stroke="none" transform="rotate(-90 296,525)">Flute Length</text>
    <!-- Reduced Shank Diameter (the narrow neck), with leader pointing to the neck -->
    <line x1="148" y1="430" x2="212" y2="430" marker-start="url(#arr)" marker-end="url(#arr)" stroke-width="0.7"/>
    <line x1="260" y1="412" x2="216" y2="428" stroke-width="0.9" marker-end="url(#arr)"/>
    <text x="263" y="408" stroke="none">Reduced Shank Ø</text>
    <line x1="120" y1="600" x2="240" y2="600" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <line x1="120" y1="562" x2="120" y2="603" stroke-dasharray="3 3"/>
    <line x1="240" y1="562" x2="240" y2="603" stroke-dasharray="3 3"/>
    <text x="180" y="620" text-anchor="middle" stroke="none">Diameter (largest)</text>
    <line x1="100" y1="595" x2="140" y2="555" marker-end="url(#arr)" stroke-width="0.9"/>
    <text x="98" y="599" text-anchor="end" stroke="none">Tip Angle</text>
  </g>
</svg>
