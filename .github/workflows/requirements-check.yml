name: Requirements Approval Check

on:
  pull_request:
    branches: [master]

jobs:
  check-requirements:
    name: All Requirements Approved
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check all requirements are approved
        run: |
          node -e "
          const https = require('https');
          const url = new URL('${{ secrets.PROD_API_URL }}/design/requirement');

          function exchangeToken() {
            return new Promise((resolve, reject) => {
              const tokenUrl = new URL('${{ secrets.PROD_API_URL }}/auth/api-key/token');
              const body = JSON.stringify({ key: '${{ secrets.PROD_API_KEY }}' });
              const req = https.request(tokenUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) },
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode !== 200) { reject(new Error('Auth failed: ' + data)); return; }
                  resolve(JSON.parse(data).accessToken);
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function fetchRequirements(token) {
            return new Promise((resolve, reject) => {
              const req = https.request(url, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode !== 200) { reject(new Error('API error: ' + data)); return; }
                  resolve(JSON.parse(data));
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function main() {
            const token = await exchangeToken();
            const reqs = await fetchRequirements(token);
            const unapproved = reqs.filter(r => !r.approved);

            console.log('Total requirements: ' + reqs.length);
            console.log('Approved: ' + (reqs.length - unapproved.length));
            console.log('Unapproved: ' + unapproved.length);

            if (unapproved.length > 0) {
              console.log('');
              console.log('Unapproved requirements:');
              for (const r of unapproved) {
                const desc = r.description.length > 80 ? r.description.substring(0, 77) + '...' : r.description;
                console.log('  ID ' + r.id + ': ' + desc);
              }
              process.exit(1);
            }

            console.log('All requirements are approved.');
          }

          main().catch(err => { console.error(err.message); process.exit(1); });
          "
