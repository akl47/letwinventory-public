name: Sync to Private

on:
  push:
    tags: ['v*']

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync public to private
        run: |
          # Remove the credential helper that actions/checkout configures (uses GITHUB_TOKEN)
          git config --unset-all http.https://github.com/.extraheader || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add private https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/akl47/letwinventory-private.git
          git fetch private master

          TAG=${GITHUB_REF#refs/tags/}

          # Checkout the private master and merge public master into it
          git checkout private/master
          git checkout -b private-master

          # Try a clean merge first
          if git merge origin/master --no-edit -m "chore: sync public repo $TAG"; then
            echo "Clean merge — pushing directly to private master"
            git push private private-master:master
          else
            echo "Conflicts detected — creating PR for manual resolution"
            git merge --abort

            # Push the public ref as a branch on the private repo
            BRANCH="sync/public-$TAG"
            git checkout origin/master
            git checkout -b "$BRANCH"
            git push private "$BRANCH"

            # Collect conflicted file list for the PR body
            git checkout private-master
            CONFLICT_FILES=$(git merge origin/master --no-commit 2>&1 | grep "CONFLICT" | sed 's/CONFLICT.*: /  - /' || true)
            git merge --abort

            # Create PR on the private repo
            gh pr create \
              --repo akl47/letwinventory-private \
              --base master \
              --head "$BRANCH" \
              --title "chore: sync public repo $TAG" \
              --body "$(cat <<EOF
          ## Sync from public repo

          Auto-sync of public repo tag \`$TAG\`. This PR has conflicts that need manual resolution.

          ### Conflicted files
          $CONFLICT_FILES

          ### Instructions
          1. Pull this branch locally
          2. Merge \`master\` into it (or rebase) and resolve conflicts
          3. Push and merge the PR

          > Public-only workflow files (\`sync-to-private.yml\`, \`version-bump.yml\`, \`require-version-label.yml\`) should be deleted if present.
          EOF
          )"

            echo "PR created on private repo for manual conflict resolution"
          fi
